databases:
  - name: tazrim-db
    databaseName: tazrim
    user: tazrim
    plan: free

services:
  - type: web
    name: tazrim-web
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tazrim-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PARTNER_EMAIL
        sync: false
      - key: PARTNER_PASSWORD
        sync: false
      - key: BOI_BASE_RATE_FALLBACK
        value: "4.5"
      - key: NODE_VERSION
        value: "20.17.0"
